<!doctype html>
<html lang="tr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>filmdownloader. // decryption_utility</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Anybody:wght@700;800&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <link rel="stylesheet" href="style.css?v=2.0" />
    </head>
    <body>
        <div class="app-container">
            <header class="app-header" style="display: flex; justify-content: space-between; align-items: center; position: relative;">
                <div class="logo">
                    <i class="fa-solid fa-terminal logo-icon"></i>
                    <h1>filmdownloader.</h1>
                </div>
                <div class="download-manager-wrapper" style="position: relative; z-index: 1001;">
                    <button id="btn-download-manager">
                        <svg class="download-manager-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>
                        <span id="download-count-badge" class="download-badge hidden">0</span>
                    </button>
                    <!-- Download Manager Popover Dropdown -->
                    <div id="download-manager-panel" class="download-manager-panel hidden glass">
                        <div class="dm-header">
                            <span>aktif_indirmeler.</span>
                            <button id="btn-clear-dm" class="btn btn-danger btn-small" style="font-size: 10px; padding: 2px 6px;">temizle.</button>
                        </div>
                        <div id="dm-tasks-list" class="dm-tasks-list">
                            <div class="dm-empty">aktif indirme yok.</div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="app-content">
                <!-- ══════════ FİLM ARA PANELİ ══════════ -->
                <div
                    id="tab-search"
                    class="tab-panel active"
                >
                    <div class="card glass" style="margin-bottom: 20px">
                        <div class="card-header">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <h2>otomatik_arama_servisi.</h2>
                        </div>
                        <div class="card-body">
                            <div class="search-type-selector">
                                <button class="type-btn active" data-type="movie">
                                    <i class="fa-solid fa-film"></i> film_ara.
                                </button>
                                <button class="type-btn" data-type="series">
                                    <i class="fa-solid fa-tv"></i> dizi_ara.
                                </button>
                            </div>
                            <div class="search-bar">
                                <input
                                    type="text"
                                    id="search-input"
                                    placeholder="aranacak film adını girin..."
                                />
                                <button id="btn-search">
                                    <i class="fa-solid fa-search"></i> ara.
                                </button>
                            </div>

                            <div id="film-grid" class="film-grid">
                                <div class="search-empty">
                                    <i
                                        class="fa-solid fa-terminal"
                                        style="
                                            font-size: 32px;
                                            margin-bottom: 12px;
                                            display: block;
                                            opacity: 0.3;
                                        "
                                    ></i>
                                    arama_sorgusu_bekleniyor...
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Otomatik indirme kuyruğu: Gizli tutuluyor, JS referansları için -->
                    <div id="download-queue" class="hidden"></div>
                </div>

                <!-- ══════════ İNDİRİLENLER PANELİ ══════════ -->
                <div id="tab-downloads" class="tab-panel active">
                    <div class="card glass" style="margin-bottom: 20px; display: flex; flex-direction: column;">
                        <div class="card-header">
                            <i class="fa-solid fa-folder-open"></i>
                            <h2>indirilen_videolar.</h2>
                        </div>
                        <div class="card-body" style="flex-grow: 1; display: flex; flex-direction: column; max-height: 480px; overflow-y: auto;">
                            <div id="downloads-list" class="downloads-list">
                                <div class="downloads-empty">
                                    <i class="fa-solid fa-folder-minus" style="font-size: 32px; margin-bottom: 12px; display: block; opacity: 0.3;"></i>
                                    indirilen video bulunamadı.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- Sezon & Bölüm Seçim Modalı -->
        <div id="series-modal" class="modal-overlay hidden">
            <div class="modal-content glass">
                <div class="modal-header">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <i class="fa-solid fa-tv" style="color: var(--primary); font-size: 1.5rem;"></i>
                        <h2 id="modal-series-title">dizi_adi.</h2>
                    </div>
                    <button id="btn-close-modal" class="btn btn-danger btn-small">
                        <i class="fa-solid fa-xmark"></i> kapat.
                    </button>
                </div>
                <div class="modal-body">
                    <div id="modal-seasons-bar" class="seasons-bar">
                        <!-- Sezon Butonları dinamik eklenecek -->
                    </div>
                    
                    <div id="bulk-download-panel" class="bulk-download-panel hidden">
                        <div class="bulk-title">
                            <svg class="download-svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter" style="display:inline-block; vertical-align:middle; margin-right:6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg> sezonu_toplu_indir.
                        </div>
                        <div class="bulk-controls">
                            <div class="control-group">
                                <label for="bulk-lang">yayın türü:</label>
                                <select id="bulk-lang" style="padding: 0.4rem 1.6rem 0.4rem 0.8rem;">
                                    <!-- Dinamik olarak dolacak -->
                                </select>
                            </div>
                            <div class="control-group">
                                <label for="bulk-quality">kalite:</label>
                                <select id="bulk-quality" style="padding: 0.4rem 1.6rem 0.4rem 0.8rem;">
                                    <!-- Dinamik olarak dolacak -->
                                </select>
                            </div>
                            <button id="btn-bulk-download" class="btn btn-primary btn-small">
                                <svg class="download-svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter" style="display:inline-block; vertical-align:middle; margin-right:6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg> sezonu_indir.
                            </button>
                        </div>
                    </div>

                    <div id="modal-episodes-list" class="episodes-list">
                        <!-- Bölümler buraya dinamik eklenecek -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Custom Confirm Modal Overlay -->
        <div id="custom-confirm-modal" class="modal-overlay hidden" style="z-index: 2000;">
            <div class="modal-content" style="max-width: 450px; padding: 20px; text-transform: lowercase; gap: 16px; border: 2px solid var(--primary); background: var(--bg-card); position: relative;">
                <div class="modal-header" style="border-bottom: 1px solid var(--outline); padding-bottom: 10px;">
                    <h2 style="font-family:'Space Grotesk', sans-serif; font-size: 1.15rem; color: var(--primary); margin:0;"><i class="fa-solid fa-triangle-exclamation"></i> sistem_onayi.</h2>
                </div>
                <div class="modal-body" style="font-size: 0.9rem; color: var(--text-main); line-height: 1.4; padding: 5px 0;">
                    <p id="custom-confirm-text" style="margin: 0;"></p>
                </div>
                <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid var(--outline); padding-top: 12px;">
                    <button id="btn-confirm-yes" class="btn btn-primary btn-small">tamam.</button>
                    <button id="btn-confirm-no" class="btn btn-danger btn-small">iptal.</button>
                </div>
            </div>
        </div>

        <!-- Video Player Modal Overlay -->
        <div id="video-player-modal" class="modal-overlay hidden" style="z-index: 2100;">
            <div class="video-player-content glass" style="max-width: 960px; width: 90%; background: var(--bg-card); border: 2px solid var(--primary); padding: 0; display: flex; flex-direction: column; position: relative;">
                <div class="modal-header" style="padding: 12px 20px; border-bottom: 1px solid var(--outline); display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 10px; overflow: hidden; white-space: nowrap;">
                        <i class="fa-solid fa-circle-play" style="color: var(--primary); font-size: 1.2rem;"></i>
                        <h2 id="video-player-title" style="font-size: 1rem; margin: 0; text-transform: lowercase; text-overflow: ellipsis; overflow: hidden;">video_oynatici.</h2>
                    </div>
                    <button id="btn-close-video" class="btn btn-danger btn-small">
                        <i class="fa-solid fa-xmark"></i> kapat.
                    </button>
                </div>
                <div class="video-player-body" style="background: #000; position: relative; display: flex; align-items: center; justify-content: center; aspect-ratio: 16/9; overflow: hidden;">
                    <video id="main-video-element" style="width: 100%; height: 100%; object-fit: contain;"></video>
                    
                    <!-- Custom Controls Overlay -->
                    <div class="video-controls-overlay" id="video-controls-overlay">
                        <!-- Timeline Slider -->
                        <div class="video-timeline-wrapper" id="video-timeline-wrapper">
                            <div class="video-timeline-bg" id="video-timeline-bg">
                                <div class="video-timeline-fill" id="video-timeline-fill"></div>
                                <div class="video-timeline-handle" id="video-timeline-handle"></div>
                            </div>
                        </div>
                        
                        <div class="video-controls-row">
                            <!-- Left Controls: Play, Back, Forward, Volume -->
                            <div class="controls-left">
                                <button id="btn-video-play" class="control-btn" title="Oynat/Duraklat (Space)">
                                    <i class="fa-solid fa-play"></i>
                                </button>
                                <button id="btn-video-rewind" class="control-btn" title="10 Saniye Geri (Sol Yön Tuşu)">
                                    <i class="fa-solid fa-backward"></i>
                                </button>
                                <button id="btn-video-forward" class="control-btn" title="10 Saniye İleri (Sağ Yön Tuşu)">
                                    <i class="fa-solid fa-forward"></i>
                                </button>
                                
                                <div class="video-volume-wrapper">
                                    <button id="btn-video-mute" class="control-btn" title="Sessiz">
                                        <i class="fa-solid fa-volume-high"></i>
                                    </button>
                                    <input type="range" id="video-volume-slider" min="0" max="1" step="0.05" value="1">
                                </div>
                            </div>
                            
                            <!-- Center: Time Display -->
                            <div class="controls-center font-code">
                                <span id="video-current-time">00:00:00</span>
                                <span class="separator" style="color: var(--text-muted); margin: 0 4px;">/</span>
                                <span id="video-duration">00:00:00</span>
                            </div>
                            
                            <!-- Right Controls: Picture-in-Picture, Fullscreen -->
                            <div class="controls-right">
                                <button id="btn-video-pip" class="control-btn" title="Picture in Picture">
                                    <i class="fa-solid fa-window-restore"></i>
                                </button>
                                <button id="btn-video-fullscreen" class="control-btn" title="Tam Ekran (F)">
                                    <i class="fa-solid fa-expand"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="app-footer">
            <p>filmdownloader_v1.0.0 // system_active.</p>
        </footer>

        <script src="app.js?v=2.0" type="module"></script>
    </body>
</html>
